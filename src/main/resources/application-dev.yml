spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        generate_statistics: false
  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    p6spy: info

decorator:
  datasource:
    p6spy:
      enable-logging: true
      multiline: true
      logging: slf4j

app:
  frontend-url: http://localhost:5173
  backend-url: http://localhost:8081

swagger:
  enabled: true

actuator:
  secured: false

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always