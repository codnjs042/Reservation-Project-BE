spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        generate_statistics: true
  flyway:
    enabled: true
    locations: classpath:db/migration

cors:
  allowed-origin: http://localhost:5173

swagger:
  enabled: true

logging:
  level:
    org.hibernate.SQL: warn

vworld:
  domain: http://localhost:8081

decorator:
  datasource:
    p6spy:
      enable-logging: true
      multiline: true
      logging: slf4j