spring:
  datasource:
    url: ${DEV_DB}
    username: ${DEV_DB_USERNAME}
    password: ${DEV_DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        generate_statistics: false
  flyway:
    enabled: true
    locations: classpath:db/migration

  config:
    import: optional:file:.env[.properties]

logging:
  level:
    p6spy: info

decorator:
  datasource:
    p6spy:
      enable-logging: true
      multiline: true
      logging: slf4j

app:
  frontend-url: http://localhost:5173
  backend-url: http://localhost:8081

swagger:
  enabled: true

actuator:
  secured: false

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

jwt:
  secret: ${DEV_JWT_SECRET}
  access-token-expiration: 1800
  refresh-token-expiration: 604800

culture:
  api:
    key: ${DEV_CULTURE_API_KEY}

vworld:
  api:
    key: ${DEV_VWORLD_API_KEY}