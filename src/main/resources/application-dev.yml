spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        generate_statistics: true
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  frontend-url: http://localhost:5173
  backend-url: http://localhost:8081

swagger:
  enabled: true

logging:
  level:
    org.hibernate.SQL: warn

decorator:
  datasource:
    p6spy:
      enable-logging: true
      multiline: true
      logging: slf4j