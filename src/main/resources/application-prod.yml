spring:
  datasource:
    url: ${PROD_DB}
    username: ${PROD_DB_USERNAME}
    password: ${PROD_DB_PASSWORD}

  data:
    redis:
      host: localhost
      port: 6379

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        generate_statistics: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

app:
  frontend-url: https://yarmspot.store
  backend-url: https://yarmspot.store

decorator:
  datasource:
    p6spy:
      enable-logging: false

swagger:
  enabled: false

actuator:
  secured: true

logging:
  level:
    root: WARN
    com.example.demo: INFO
    org.hibernate.SQL: ERROR

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

jwt:
  secret: ${PROD_JWT_SECRET}
  access-token-expiration: 1800
  refresh-token-expiration: 604800

culture:
  api:
    key: ${PROD_CULTURE_API_KEY}

vworld:
  api:
    key: ${PROD_VWORLD_API_KEY}