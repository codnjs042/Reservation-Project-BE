spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        generate_statistics: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

app:
  frontend-url: https://yarmspot.store
  backend-url: https://yarmspot.store

decorator:
  datasource:
    p6spy:
      enable-logging: false

swagger:
  enabled: false

actuator:
  secured: true

logging:
  level:
    root: WARN
    com.example.demo: INFO
    org.hibernate.SQL: ERROR

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized