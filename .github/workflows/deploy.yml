name: Backend Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            sudo kill -9 $(sudo lsof -t -i :8081) || true
            cd Reservation-Project-BE
            git pull origin main
            ./gradlew build -x test
            sudo nohup java -jar build/libs/demo-0.0.1-SNAPSHOT.jar \
              --spring.profiles.active=prod \
              --spring.config.additional-location=file:/home/ubuntu/application-private.yml,file:/home/ubuntu/application-private-prod.yml > app.log 2>&1 &
